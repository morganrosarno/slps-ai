<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SLPS AI</title>
</head>
<body style="font-family: Arial; padding: 40px;">

    <h1>SLPS AI</h1>

    <input type="file" id="fileInput">
    <br><br>

    <button onclick="analizza()">Analizza</button>

    <br><br>

    <div id="output" style="background:#eee; padding:20px; min-height:50px;"></div>

    <script>
        async function analizza() {
            const fileInput = document.getElementById("fileInput");
            const output = document.getElementById("output");

            if (fileInput.files.length === 0) {
                output.innerText = "Seleziona un file";
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            output.innerText = "Analisi in corso...";

            try {
                const response = await fetch("/analizza", {
                    method: "POST",
                    body: formData
                });

                // 🔥 CONTROLLO RISPOSTA
                const text = await response.text();
                console.log("RAW RESPONSE:", text);

                let data;
                try {
                    data = JSON.parse(text);
                } catch {
                    output.innerText = "Errore: risposta non JSON";
                    return;
                }

                // 🔥 ALLINEAMENTO PERFETTO
                if (data.risultato !== undefined) {
                    output.innerText = data.risultato;
                } else {
                    output.innerText = "Errore: campo 'risultato' mancante";
                }

            } catch (error) {
                console.error(error);
                output.innerText = "Errore di connessione";
            }
        }
    </script>

</body>
</html>
