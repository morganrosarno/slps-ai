<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SLPS AI</title>
</head>
<body style="font-family: Arial; padding: 40px;">

    <h1>SLPS AI</h1>

    <input type="file" id="fileInput">
    <br><br>
    <button onclick="analizza()">Analizza</button>

    <p id="output"></p>

    <script>
        async function analizza() {
            const fileInput = document.getElementById("fileInput");
            const output = document.getElementById("output");

            if (fileInput.files.length === 0) {
                output.innerText = "Seleziona un file";
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            output.innerText = "Analisi in corso...";

            try {
                const response = await fetch("/analizza", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                console.log("RISPOSTA:", data);

                output.innerText = data.risultato;

            } catch (error) {
                console.error(error);
                output.innerText = "Errore nella richiesta";
            }
        }
    </script>

</body>
</html>
